name: wwww

on:
  workflow_dispatch:
permissions:
  id-token: write
jobs:
  rdp:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set strong password for current user
      shell: powershell
      run: |
        Write-Host "Changing password for user: $user"
        net user runneradmin 1qaz@WSX

        # 确保允许 RDP
        Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Download 
      shell: powershell
      run: |
        Invoke-WebRequest `
          -Uri https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe `
          -OutFile cloudflared.exe
    - name: Start cloudflared and show URL
      shell: pwsh
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: |
        $ErrorActionPreference = "Stop"

        # 日志文件（只在 runner 本地）
        $log = "$PWD\cloudflared.log"

        # Start cloudflared in a separate process so this step can finish.
        $command = "& '$PWD\cloudflared.exe' tunnel --url tcp://localhost:3389 *> '$log'"
        $process = Start-Process `
          -FilePath "pwsh" `
          -ArgumentList @("-NoProfile", "-Command", $command) `
          -WindowStyle Hidden `
          -PassThru

        "CLOUDFLARED_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append

        # 等待 trycloudflare URL
        $url = $null
        for ($i = 0; $i -lt 60; $i++) {
          Start-Sleep 1
          if (Test-Path $log) {
            $regex = [regex]'https://[^\s]+\.trycloudflare\.com'
            $match = Select-String -Path $log -Pattern $regex | Select-Object -First 1
            if ($match) {
              $url = $match.Matches[0].Value
              break
            }
          }
        }

        if (-not $url) {
          Write-Error "Failed to obtain trycloudflare URL"
        }

        Write-Host ""
        Write-Host "============================================================"
        Write-Host "Cloudflare tunnel URL:"
        Write-Host "$url"
        Write-Host "============================================================"
        Write-Host "::notice title=Cloudflare tunnel URL::$url"

        @"
        ## Cloudflare tunnel URL

        $url
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

    - name: Keep runner alive
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        if ($env:CLOUDFLARED_PID) {
          Write-Host "cloudflared process id: $env:CLOUDFLARED_PID"
        }

        Write-Host "RDP is ready. Keeping runner alive..."
        while ($true) {
          Start-Sleep -Seconds 300
        }
