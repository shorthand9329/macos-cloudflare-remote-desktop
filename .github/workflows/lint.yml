name: macOS VNC Cloudflare Tunnel

on:
  workflow_dispatch: # 允许手动在 GitHub 页面点击启动

jobs:
  build:
    runs-on: macos-latest # 使用最新的 macOS 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure SSH Public Key
      run: |
        echo "=== 配置 SSH 公钥 ==="
        # 创建 .ssh 目录
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # 写入用户提供的公钥
        echo "ssh-rsa " > ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        
        echo "=== 检查并启动 macOS SSH 服务 ==="
        # GitHub Actions macOS 通常默认开启了 SSH，这里做一次强制启动确保万无一失
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        echo "SSH 公钥配置并检查完毕！"
        cd ~/.ssh
        pwd



    - name: Install Cloudflared
      run: |
        echo "=== 使用 Homebrew 安装 cloudflared ==="
        brew install cloudflared

    - name: Start Cloudflare Tunnel for VNC
      run: |
        echo "=== 启动 Cloudflare 隧道并暴露 VNC 端口 ==="
        echo "提示: macOS VNC 默认端口为 5900"
        
        # 使用 tcp:// 协议暴露 5900 端口，并创建匿名临时隧道
        # 使用 nohup 后台运行，防止步骤阻塞导致工作流卡死
        nohup cloudflared tunnel --url tcp://localhost:22 > cloudflared.log 2>&1 &
        
        # 等待几秒让隧道建立
        sleep 5
        
        echo "=== 正在获取公网访问 URL ==="
        # 从日志中提取 cloudflare 自动分配的 trycloudflare.com 域名
        cat cloudflared.log
        
        echo "============================================="
        echo "请在下方日志中寻找以 .trycloudflare.com 结尾的地址"
        echo "============================================="
        grep -o 'https://[^ ]*trycloudflare.com' cloudflared.log || true
        
        # 保持连接活跃，避免任务过早结束（GitHub Action 单次任务最长运行 6 小时）
        echo "隧道已在后台运行，保持工作流启动中..."
        sleep 216000 
