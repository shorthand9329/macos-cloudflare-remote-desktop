name: macOS VNC Cloudflare Tunnel

on:
  workflow_dispatch: # 允许手动在 GitHub 页面点击启动

jobs:
  build:
    runs-on: macos-latest # 使用最新的 macOS 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure SSH Daemon and Public Key
      run: |
        echo "=== 1. 配置 SSH 公钥 ==="
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "ssh-rsa " > ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        
        echo "=== 2. 注入 Debug 级 SSHD 配置 ==="
        # 允许公钥登录并强制开启最高级别的 DEBUG3 日志
        sudo sed -i '' 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/g' /etc/ssh/sshd_config || true
        echo "LogLevel DEBUG3" | sudo tee -a /etc/ssh/sshd_config
        echo "StrictModes no" | sudo tee -a /etc/ssh/sshd_config
        
        echo "=== 3. 重启 macOS SSH 服务 ==="
        sudo launchctl unload -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        # 指定将 sshd 日志独立输出到系统流或指定文件
        sudo /usr/sbin/sshd -E /var/log/sshd.log || true
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        
        # 确保日志文件存在
        sudo touch /var/log/sshd.log
        sudo chmod 644 /var/log/sshd.log
        echo "SSH 调试环境配置完毕"



    - name: Install Cloudflared
      run: |
        echo "=== 使用 Homebrew 安装 cloudflared ==="
        brew install cloudflared

    - name: Start Cloudflare Tunnel and Monitor Logs
      run: |
        echo "=== 启动 Cloudflare 隧道 ==="
        nohup cloudflared tunnel --url tcp://localhost:22 > cloudflared.log 2>&1 &
        
        sleep 5
        echo "============================================="
        echo "请使用下方生成的域名在本地建立桥接连接："
        grep -o 'https://[^ ]*trycloudflare.com' cloudflared.log || true
        echo "============================================="

        echo "=== 实时监控：每 5 秒输出一次 SSH 认证认证日志 ==="
        # 启动一个无限循环，每5秒打印最新日志，并用标记包裹方便阅读
        for i in {1..2000}; do
          echo "---- [SSH LOG TRACE] $(date) ----"
          sudo tail -n 20 /var/log/sshd.log || echo "暂无日志"
          sleep 5
        done
