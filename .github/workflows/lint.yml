name: macOS VNC Cloudflare Tunnel

on:
  workflow_dispatch: # 允许手动在 GitHub 页面点击启动

jobs:
  build:
    runs-on: macos-14 # 使用最新的 macOS 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure SSH Daemon and Public Key
      run: |
        echo "=== 1. 配置家目录与 .ssh 严格权限 ==="
        # 修复关键：macOS 如果检测到 /Users/runner 权限过大，会直接无视 authorized_keys
        chmod 755 /Users/runner
        
        mkdir -p /Users/runner/.ssh
        echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFTZ2CVaykNEBtnsALM+1EPQJVG61lxx80S556QyUz8G root@aa" > /Users/runner/.ssh/authorized_keys
        
        # 必须是 700 和 600，保证安全检查通过
        chmod 700 /Users/runner/.ssh
        chmod 600 /Users/runner/.ssh/authorized_keys
        chown -R runner:staff /Users/runner/.ssh

        echo "=== 2. 强行兼容旧版 ssh-rsa 签名算法 ==="
        # 允许公钥登录，并强制恢复对 ssh-rsa 算法的支持
        sudo sed -i '' 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/g' /etc/ssh/sshd_config || true
        echo "PubkeyAcceptedKeyTypes=+ssh-rsa" | sudo tee -a /etc/ssh/sshd_config
        echo "StrictModes no" | sudo tee -a /etc/ssh/sshd_config

        echo "=== 3. 彻底重载并独立启动 SSH 服务 ==="
        sudo launchctl unload -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        sudo killall sshd 2>/dev/null || true  

    - name: Enable Screen Sharing
      run: |
        set -euo pipefail

        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate \
          -configure -access -on \
          -users "$USER" \
          -privs -all \
          -restart -agent -menu

        sudo lsof -nP -iTCP:5900 -sTCP:LISTEN || true

    - name: Install Cloudflared
      run: |
        echo "=== 使用 Homebrew 安装 cloudflared ==="
        brew install cloudflared

    - name: Start Cloudflare Tunnel and Monitor Logs
      run: |
        echo "=== 启动 Cloudflare 隧道 ==="
        nohup cloudflared tunnel --url tcp://localhost:22 > cloudflared.log 2>&1 &
        
        sleep 8
        echo "============================================="
        echo "请使用下方生成的域名在本地建立桥接连接："
        grep -o 'https://[^ ]*trycloudflare.com' cloudflared.log || true
        echo "============================================="
        sleep 21800
