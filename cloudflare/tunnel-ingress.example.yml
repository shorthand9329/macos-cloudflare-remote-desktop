# Example for a locally managed Cloudflare Tunnel.
# Replace vnc.example.com with a hostname on a domain in your Cloudflare account.
# Keep credentials files and connector tokens out of git.

tunnel: macos-remote-desktop
credentials-file: /Users/YOUR_USER/.cloudflared/TUNNEL_ID.json

ingress:
  - hostname: vnc.example.com
    service: tcp://localhost:5900
  - service: http_status:404
